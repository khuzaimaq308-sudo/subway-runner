<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Subway Runner</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme / icons -->
    <meta name="theme-color" content="#060614" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Subway Runner" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- SEO / Open Graph -->
    <meta name="description" content="3D endless runner — collect gold watches, beat the leaderboard and win monthly PKR prizes!" />
    <meta property="og:title" content="Subway Runner" />
    <meta property="og:description" content="Collect watches. Climb the ranks. Win real prizes." />
    <meta property="og:image" content="/opengraph.jpg" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Lock orientation to landscape as early as possible (works in TWA/PWA)
      (function() {
        function lockLandscape() {
          try {
            if (screen.orientation && typeof screen.orientation.lock === "function") {
              screen.orientation.lock("landscape").catch(function() {});
            }
          } catch(e) {}
        }
        lockLandscape();
        document.addEventListener("DOMContentLoaded", lockLandscape);
        window.addEventListener("load", lockLandscape);
      })();

      // Silently clean up any stale caches/service workers in the background.
      // No reload — let the page render normally. The fresh bundle is already loading.
      (function() {
        try {
          if ("caches" in window) {
            caches.keys().then(function(keys) {
              keys.forEach(function(k) {
                if (k.indexOf("subway-runner-v3") === -1) caches.delete(k);
              });
            }).catch(function(){});
          }
        } catch(e) {}

        if ("serviceWorker" in navigator) {
          window.addEventListener("load", function() {
            navigator.serviceWorker.register("/sw.js").catch(function(){});
          });
        }
      })();
    </script>
  </body>
</html>
